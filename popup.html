<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>SnapTeX</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080810; --surface: #10101a; --border: #1e1e35;
      --accent: #7c6af7; --text: #e8e8f0; --muted: #5a5a70; --radius: 10px;
    }
    html, body { width: 100%; height: 100%; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; display: flex; overflow: hidden; min-width: 480px; min-height: 520px; }
    
    .main { flex: 1; padding: 16px; border-right: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; }
    .bag-panel { width: 160px; background: var(--surface); border-left: 1px solid var(--border); padding: 12px; overflow-y: auto; display: flex; flex-direction: column; }
    
    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 16px; background: linear-gradient(135deg, #a78bfa, #7c6af7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 12px; flex-shrink: 0; }
    
    .section { margin-bottom: 14px; flex-shrink: 0; }
    .section-label { font-size: 9px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    
    .btn { width: 100%; padding: 8px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer; transition: all .15s; margin-bottom: 4px; flex-shrink: 0; }
    .btn:hover { border-color: var(--accent); background: rgba(124,106,247,.08); }
    .btn.primary { background: linear-gradient(135deg, #6d59e8, #7c6af7); border-color: #7c6af7; }
    .btn.primary:hover { box-shadow: 0 4px 18px rgba(124,106,247,.3); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .bag-label { font-size: 9px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; flex-shrink: 0; }
    .bag-count { font-size: 9px; color: var(--muted); text-align: center; margin-bottom: 6px; flex-shrink: 0; }
    
    .thumbnails { display: flex; flex-direction: column; gap: 4px; flex: 1; overflow-y: auto; min-height: 0; margin-bottom: 8px; }
    .thumbnail { width: 100%; height: 45px; border: 1px solid var(--border); border-radius: 4px; background: #0a0a0f; cursor: pointer; overflow: hidden; position: relative; flex-shrink: 0; }
    .thumbnail img { width: 100%; height: 100%; object-fit: cover; }
    .thumbnail:hover { border-color: var(--accent); }
    .thumbnail .delete { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,.7); color: #ef4444; border: none; width: 16px; height: 16px; border-radius: 2px; font-size: 9px; cursor: pointer; display: none; }
    .thumbnail:hover .delete { display: block; }
    
    .bag-actions { margin-top: 6px; display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
    .bag-actions .btn { margin-bottom: 0; font-size: 10px; padding: 6px; }
  </style>
</head>
<body>

<div class="main">
  <div class="logo">SnapTeX</div>
  
  <div class="section">
    <div class="section-label">📸 Screenshots</div>
    <button class="btn" id="btn-region">Select Region</button>
    <button class="btn" id="btn-visible">Visible Area</button>
    <button class="btn" id="btn-fullpage">Full Page</button>
  </div>

  <div class="section">
    <div class="section-label">∑ Converter</div>
    <button class="btn" id="btn-equation">Equation Converter</button>
  </div>
</div>

<div class="bag-panel">
  <div class="bag-label">📦 Bag</div>
  <div class="bag-count" id="bag-count">0 screenshots</div>
  <div class="thumbnails" id="thumbnails"></div>
  <div class="bag-actions">
    <button class="btn primary" id="btn-download-bag" disabled>Download</button>
    <button class="btn primary" id="btn-paste-bag" disabled>Paste</button>
    <button class="btn" id="btn-clear-bag" disabled>Clear</button>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
