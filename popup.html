<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SnapTeX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #1e1e2e;
      --accent: #7c6af7;
      --accent2: #f97316;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --success: #22c55e;
      --radius: 10px;
    }

    body {
      width: 300px;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overflow: hidden;
    }

    .header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, #0f0f1a 0%, #13111f 100%);
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      top: -30px; right: -30px;
      width: 100px; height: 100px;
      background: radial-gradient(circle, rgba(124,106,247,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 20px;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #a78bfa, #7c6af7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
      margin-top: 2px;
      text-transform: uppercase;
    }

    .section {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .section-label {
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .btn {
      width: 100%;
      padding: 11px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.15s ease;
      margin-bottom: 8px;
      position: relative;
      overflow: hidden;
    }

    .btn:last-child { margin-bottom: 0; }

    .btn:hover {
      border-color: var(--accent);
      background: rgba(124,106,247,0.08);
      transform: translateY(-1px);
    }

    .btn:active { transform: translateY(0); }

    .btn.primary {
      background: linear-gradient(135deg, #6d59e8, #7c6af7);
      border-color: #7c6af7;
      font-weight: 500;
    }

    .btn.primary:hover {
      background: linear-gradient(135deg, #7c6af7, #8b7cf8);
      box-shadow: 0 4px 20px rgba(124,106,247,0.3);
    }

    .btn.accent2 {
      border-color: rgba(249,115,22,0.3);
    }
    .btn.accent2:hover {
      border-color: var(--accent2);
      background: rgba(249,115,22,0.08);
    }

    .btn-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      opacity: 0.9;
    }

    .btn-text { flex: 1; text-align: left; line-height: 1.3; }
    .btn-title { display: block; font-size: 12px; }
    .btn-sub { display: block; font-size: 9px; color: var(--muted); margin-top: 1px; letter-spacing: 0.03em; }

    .badge {
      font-size: 8px;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(124,106,247,0.2);
      color: #a78bfa;
      letter-spacing: 0.05em;
    }

    .status-bar {
      padding: 10px 20px;
      font-size: 10px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 6px var(--success);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    #toast {
      display: none;
      position: fixed;
      bottom: 10px; left: 10px; right: 10px;
      padding: 8px 12px;
      background: var(--success);
      color: #fff;
      border-radius: 6px;
      font-size: 11px;
      text-align: center;
      animation: slideUp 0.2s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(10px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">SnapTeX</div>
  <div class="tagline">Screenshot · Equation Converter</div>
</div>

<div class="section">
  <div class="section-label">📸 Screenshots</div>

  <button class="btn primary" id="btn-fullpage">
    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <path d="M3 9h18M9 21V9"/>
    </svg>
    <span class="btn-text">
      <span class="btn-title">Full-Page Screenshot</span>
      <span class="btn-sub">Captures entire scrollable page</span>
    </span>
    <span class="badge">SCROLL</span>
  </button>

  <button class="btn" id="btn-visible">
    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <path d="M3 9h18"/>
    </svg>
    <span class="btn-text">
      <span class="btn-title">Visible Area</span>
      <span class="btn-sub">Current viewport only</span>
    </span>
  </button>

  <button class="btn" id="btn-region">
    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M3 9V5a2 2 0 012-2h4M15 3h4a2 2 0 012 2v4M21 15v4a2 2 0 01-2 2h-4M9 21H5a2 2 0 01-2-2v-4"/>
      <rect x="8" y="8" width="8" height="8" rx="1" stroke-dasharray="2 2"/>
    </svg>
    <span class="btn-text">
      <span class="btn-title">Select Region</span>
      <span class="btn-sub">Draw to capture area</span>
    </span>
  </button>
</div>

<div class="section">
  <div class="section-label">∑ Equation Tools</div>

  <button class="btn accent2" id="btn-equation">
    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="1.8">
      <path d="M4 7h16M4 12h10M4 17h16"/>
      <circle cx="18" cy="12" r="2" stroke="#f97316"/>
    </svg>
    <span class="btn-text">
      <span class="btn-title" style="color:#f97316">Equation Converter</span>
      <span class="btn-sub">LaTeX → Docs/Word compatible text</span>
    </span>
  </button>
</div>

<div class="status-bar">
  <div class="status-dot"></div>
  <span>Ready on active tab</span>
</div>

<div id="toast"></div>

<script src="popup.js"></script>
</body>
</html>
